name: Publish SDK to PyPI

# Requires one-time setup on PyPI and TestPyPI before this workflow can publish.
# Configure trusted publishing (OIDC — no stored token needed):
#
#   TestPyPI: https://test.pypi.org/manage/project/aindy-sdk/settings/publishing/
#     GitHub owner: Masterplanner25  Repository: aindy-sdk-  Workflow: publish.yml
#     Environment: testpypi
#
#   PyPI: https://pypi.org/manage/project/aindy-sdk/settings/publishing/
#     GitHub owner: Masterplanner25  Repository: aindy-sdk-  Workflow: publish.yml
#     Environment: production
#
# Also create two GitHub Environments (Settings → Environments):
#   testpypi  — no required reviewers (automatic gate)
#   production — add yourself as a required reviewer (manual approval gate)

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read

jobs:
  validate-version:
    name: Validate Tag Matches Package Version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.check.outputs.version }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Assert tag matches _version.py
        id: check
        run: |
          python - <<'PY'
          import re, sys, os, tomllib
          from pathlib import Path

          tag = os.environ["GITHUB_REF_NAME"]        # v1.0.0
          expected = tag.lstrip("v")

          src = Path("aindy_sdk/_version.py").read_text(encoding="utf-8")
          m = re.search(r'__version__\s*=\s*"([^"]+)"', src)
          if not m:
              print("__version__ not found in aindy_sdk/_version.py", file=sys.stderr)
              sys.exit(1)
          actual = m.group(1)
          if actual != expected:
              print(f"Tag {tag} does not match package version {actual}", file=sys.stderr)
              sys.exit(1)

          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          assert pyproject["project"]["name"] == "aindy-sdk", "package name mismatch"

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              print(f"version={actual}", file=out)
          print(f"Version OK: {actual}")
          PY

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: pip install ruff==0.15.6

      - name: Lint
        run: ruff check . --config ruff.toml

  build:
    name: Build sdist and Wheel
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [validate-version, lint]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*
          ls -la dist/

      - name: Verify package imports cleanly from wheel
        run: |
          python -m venv smoke_venv
          smoke_venv/bin/pip install --upgrade pip
          smoke_venv/bin/pip install dist/aindy_sdk-*.whl
          smoke_venv/bin/python -c "
          import aindy_sdk
          from aindy_sdk import AINDYClient
          assert hasattr(aindy_sdk, '__version__'), '__version__ not exported'
          print(f'aindy_sdk {aindy_sdk.__version__} OK')
          "

      - name: Upload dist artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: aindy-sdk-dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    environment: testpypi
    permissions:
      id-token: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: aindy-sdk-dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [publish-testpypi]
    environment: production
    permissions:
      id-token: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: aindy-sdk-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [publish-pypi]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download dist artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: aindy-sdk-dist
          path: dist/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" dist/* \
            --title "aindy-sdk ${{ github.ref_name }}" \
            --generate-notes
